version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    ports:
      - "5001:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://postgres:password@db:5432/mlflow
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    depends_on:
      - db
    command: mlflow server --host 0.0.0.0 --backend-store-uri postgresql://postgres:password@db:5432/mlflow --default-artifact-root /mlflow/artifacts

volumes:
  postgres_data:
